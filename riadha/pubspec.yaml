name: riadha
description: A fitness app with workouts and meal plans
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  # Networking
  http: ^1.1.0
  
  # Notifications (using older stable version)
 
  
  # Utilities
  intl: ^0.18.1
  connectivity_plus: ^5.0.2
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true