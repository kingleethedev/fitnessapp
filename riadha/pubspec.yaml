name: riadha
description: A fitness app with workouts and meal plans
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  
  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.66.0

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Networking
  http: ^1.1.0
  cached_network_image: ^3.3.0
 #  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.1
  # Video Players (NEW)
  webview_flutter: ^4.4.0
  video_player: ^2.8.1
  chewie: ^1.7.0  # Optional: Better video controls

  #payments stripe
  flutter_stripe: ^10.0.0
  # Utilities
  intl: ^0.18.1
  connectivity_plus: ^5.0.2
  share_plus: ^7.2.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"