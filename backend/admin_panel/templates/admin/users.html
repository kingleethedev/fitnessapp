{% extends 'admin/base.html' %}
{% block page_title %}Users Management{% endblock %}

{% block content %}
<style>
    .stats-summary {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .stat-badge {
        background: var(--white);
        padding: 10px 20px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .stat-badge i {
        font-size: 20px;
        color: var(--primary);
    }
    .stat-badge span {
        font-weight: 600;
        color: var(--gray-dark);
    }
    .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 20px;
        flex-wrap: wrap;
    }
    .pagination button {
        padding: 8px 14px;
        background: var(--white);
        border: 1px solid #ddd;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .pagination button:hover {
        background: var(--primary-light);
    }
    .pagination button.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }
    .pagination button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .btn-warning {
        background: var(--warning);
        color: #333;
    }
    .btn-warning:hover {
        background: #e0a800;
    }
    .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--primary-light);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-right: 8px;
    }
    .user-avatar i {
        color: var(--primary);
        font-size: 14px;
    }
</style>

<div class="stats-summary">
    <div class="stat-badge">
        <i class="fas fa-users"></i>
        <span>Total Users: <strong id="total-users-count">-</strong></span>
    </div>
    <div class="stat-badge">
        <i class="fas fa-user-check"></i>
        <span>Active: <strong id="active-users-count">-</strong></span>
    </div>
    <div class="stat-badge">
        <i class="fas fa-crown"></i>
        <span>Premium: <strong id="premium-users-count">-</strong></span>
    </div>
</div>

<div class="search-bar">
    <input type="text" id="search-input" placeholder="Search by username or email..." class="form-control">
    <button class="btn btn-primary" onclick="searchUsers()">
        <i class="fas fa-search"></i> Search
    </button>
</div>

<div class="data-table">
    <table>
        <thead>
            <tr>
                <th>User</th>
                <th>Email</th>
                <th>Subscription</th>
                <th>Streak</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="users-table-body">
            <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
        </tbody>
    </table>
</div>

<div id="pagination-container" class="pagination"></div>

<script>
    let currentPage = 1;
    let currentSearch = '';
    let totalPages = 1;
    
    async function loadUsers() {
        try {
            const response = await fetch(`/dashboard/api/users/list/?page=${currentPage}&search=${encodeURIComponent(currentSearch)}`);
            const data = await response.json();
            
            // Update stats
            document.getElementById('total-users-count').textContent = data.total_users || 0;
            document.getElementById('active-users-count').textContent = data.active_users || 0;
            document.getElementById('premium-users-count').textContent = data.premium_users || 0;
            
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';
            
            if (!data.users || data.users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No users found</td></tr>';
                return;
            }
            
            data.users.forEach(user => {
                const row = tbody.insertRow();
                const statusBadge = user.is_active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>';
                const subscriptionClass = user.subscription_tier === 'PREMIUM' ? 'badge-premium' : 'badge-active';
                
                row.innerHTML = `
                    <td>
                        <div style="display: flex; align-items: center;">
                            <div class="user-avatar">
                                <i class="fas fa-user"></i>
                            </div>
                            <a href="/dashboard/users/${user.id}/" style="font-weight: 500;">${escapeHtml(user.username)}</a>
                        </div>
                    </td>
                    <td>${escapeHtml(user.email)}</td>
                    <td><span class="badge ${subscriptionClass}">${user.subscription_tier || 'FREE'}</span></td>
                    <td><i class="fas fa-fire" style="color: var(--warning);"></i> ${user.streak_days || 0} days</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div style="display: flex; gap: 8px;">
                            <a href="/dashboard/users/${user.id}/edit/" class="btn btn-secondary" style="padding: 5px 10px;" title="Edit User">
                                <i class="fas fa-edit"></i>
                            </a>
                            <button onclick="banUser('${user.id}')" class="btn btn-warning" style="padding: 5px 10px;" title="${user.is_active ? 'Ban User' : 'Unban User'}">
                                <i class="fas fa-${user.is_active ? 'ban' : 'check-circle'}"></i>
                            </button>
                            <button onclick="deleteUser('${user.id}')" class="btn btn-danger" style="padding: 5px 10px;" title="Delete User">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
            });
            
            // Update pagination
            totalPages = data.total_pages || 1;
            renderPagination();
            
        } catch (error) {
            console.error('Error loading users:', error);
            document.getElementById('users-table-body').innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--danger);">Error loading users</td></tr>';
        }
    }
    
    function renderPagination() {
        const container = document.getElementById('pagination-container');
        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }
        
        let html = '';
        
        // Previous button
        html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&laquo; Previous</button>`;
        
        // Page numbers
        const startPage = Math.max(1, currentPage - 2);
        const endPage = Math.min(totalPages, currentPage + 2);
        
        if (startPage > 1) {
            html += `<button onclick="goToPage(1)">1</button>`;
            if (startPage > 2) html += `<button disabled>...</button>`;
        }
        
        for (let i = startPage; i <= endPage; i++) {
            html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
        }
        
        if (endPage < totalPages) {
            if (endPage < totalPages - 1) html += `<button disabled>...</button>`;
            html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
        }
        
        // Next button
        html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next &raquo;</button>`;
        
        container.innerHTML = html;
    }
    
    function goToPage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        loadUsers();
    }
    
    function searchUsers() {
        currentSearch = document.getElementById('search-input').value;
        currentPage = 1;
        loadUsers();
    }
    
    async function banUser(userId) {
        if (confirm('Are you sure you want to ban/unban this user?')) {
            try {
                const response = await fetch(`/dashboard/api/users/${userId}/ban/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await response.json();
                if (data.success) {
                    loadUsers();
                } else {
                    alert('Error: ' + (data.error || 'Could not ban user'));
                }
            } catch (error) {
                alert('Error banning user');
            }
        }
    }
    
    async function deleteUser(userId) {
        if (confirm('WARNING: This will permanently delete the user and all their data. Are you absolutely sure?')) {
            try {
                const response = await fetch(`/dashboard/api/users/${userId}/delete/`, {
                    method: 'DELETE',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await response.json();
                if (data.success) {
                    loadUsers();
                } else {
                    alert('Error: ' + (data.error || 'Could not delete user'));
                }
            } catch (error) {
                alert('Error deleting user');
            }
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Add enter key search
    document.getElementById('search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchUsers();
        }
    });
    
    loadUsers();
</script>
{% endblock %}
