{% extends 'admin/base.html' %}
{% block page_title %}Social Management{% endblock %}

{% block content %}
<div class="stats-grid">
    <div class="stat-card primary">
        <div class="stat-title">Total Friendships</div>
        <div class="stat-value" id="total-friendships">-</div>
    </div>
    <div class="stat-card secondary">
        <div class="stat-title">Active Challenges</div>
        <div class="stat-value" id="active-challenges">-</div>
    </div>
    <div class="stat-card success">
        <div class="stat-title">Pending Requests</div>
        <div class="stat-value" id="pending-requests">-</div>
    </div>
</div>

<div style="margin-top: 30px;">
    <h3>Social Features</h3>
    <p>Manage friends, challenges, and social interactions here.</p>
</div>

<script>
    async function loadSocialStats() {
        try {
            const response = await fetch('/dashboard/api/social/stats/');
            const data = await response.json();
            document.getElementById('total-friendships').textContent = data.total_friendships || 0;
            document.getElementById('active-challenges').textContent = data.active_challenges || 0;
            document.getElementById('pending-requests').textContent = data.pending_requests || 0;
        } catch (error) {
            console.error('Error loading social stats:', error);
        }
    }
    loadSocialStats();
</script>
{% endblock %}
