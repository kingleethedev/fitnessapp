{% extends 'admin/base.html' %}
{% block page_title %}Edit Meal: {{ meal.name }}{% endblock %}

{% block content %}
<style>
    .form-container {
        background: white;
        padding: 25px;
        border-radius: 12px;
        max-width: 900px;
        margin: 0 auto;
    }
    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 20px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        font-size: 13px;
        color: var(--gray-dark);
    }
    .form-control {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 13px;
        transition: all 0.2s;
    }
    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.1);
    }
    textarea.form-control {
        resize: vertical;
        min-height: 80px;
    }
    .checkbox-group {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        padding: 10px 0;
    }
    .checkbox-group label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: normal;
        cursor: pointer;
    }
    .image-preview {
        margin-top: 10px;
        padding: 10px;
        background: var(--gray-light);
        border-radius: 8px;
        display: inline-block;
    }
    .image-preview img {
        max-width: 150px;
        border-radius: 8px;
    }
    .action-buttons {
        margin-top: 30px;
        display: flex;
        gap: 15px;
        justify-content: flex-end;
    }
    .btn {
        padding: 8px 20px;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        border: none;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--gray-light); color: var(--gray-dark); }
    .btn-secondary:hover { background: #e0e0e0; }
    hr {
        margin: 20px 0;
        border: none;
        border-top: 1px solid #e0e0e0;
    }
    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }
        .action-buttons {
            flex-direction: column;
        }
        .btn {
            justify-content: center;
        }
    }
</style>

<div class="form-container">
    <h2 style="margin-bottom: 20px; font-size: 20px; color: var(--gray-dark);">
        Edit Meal: {{ meal.name }}
    </h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-grid">
            <div class="form-group">
                <label>Meal Name *</label>
                <input type="text" name="name" class="form-control" value="{{ meal.name }}" required>
            </div>
            <div class="form-group">
                <label>Meal Type</label>
                <select name="meal_type" class="form-control">
                    <option value="BREAKFAST" {% if meal.meal_type == 'BREAKFAST' %}selected{% endif %}>Breakfast</option>
                    <option value="LUNCH" {% if meal.meal_type == 'LUNCH' %}selected{% endif %}>Lunch</option>
                    <option value="DINNER" {% if meal.meal_type == 'DINNER' %}selected{% endif %}>Dinner</option>
                    <option value="SNACK" {% if meal.meal_type == 'SNACK' %}selected{% endif %}>Snack</option>
                </select>
            </div>
            <div class="form-group">
                <label>Calories</label>
                <input type="number" name="calories" class="form-control" value="{{ meal.calories|default:'' }}" step="10">
            </div>
            <div class="form-group">
                <label>Protein (g)</label>
                <input type="number" name="protein" class="form-control" value="{{ meal.protein|default:'' }}" step="0.1">
            </div>
            <div class="form-group">
                <label>Carbs (g)</label>
                <input type="number" name="carbs" class="form-control" value="{{ meal.carbs|default:'' }}" step="0.1">
            </div>
            <div class="form-group">
                <label>Fats (g)</label>
                <input type="number" name="fats" class="form-control" value="{{ meal.fats|default:'' }}" step="0.1">
            </div>
        </div>
        
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="3">{{ meal.description|default:'' }}</textarea>
        </div>
        
        <div class="form-group">
            <label>Ingredients</label>
            <textarea name="ingredients" class="form-control" rows="4" placeholder="List ingredients, one per line">{{ meal.ingredients|default:'' }}</textarea>
        </div>
        
        <div class="form-group">
            <label>Instructions</label>
            <textarea name="instructions" class="form-control" rows="5" placeholder="Step by step instructions">{{ meal.instructions|default:'' }}</textarea>
        </div>
        
        <div class="checkbox-group">
            <label>
                <input type="checkbox" name="is_vegetarian" {% if meal.is_vegetarian %}checked{% endif %}>
                Vegetarian
            </label>
            <label>
                <input type="checkbox" name="is_vegan" {% if meal.is_vegan %}checked{% endif %}>
                Vegan
            </label>
            <label>
                <input type="checkbox" name="is_gluten_free" {% if meal.is_gluten_free %}checked{% endif %}>
                Gluten Free
            </label>
        </div>
        
        <div class="form-group">
            <label>Meal Image</label>
            <input type="file" name="image" class="form-control" accept="image/*">
            {% if meal.image %}
                <div class="image-preview">
                    <img src="{{ meal.image.url }}" alt="{{ meal.name }}">
                    <p style="font-size: 11px; color: var(--gray); margin-top: 5px;">Current image</p>
                </div>
            {% endif %}
        </div>
        
        <hr>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if meal.is_active %}checked{% endif %}>
                Active (visible to users)
            </label>
        </div>
        
        <div class="action-buttons">
            <a href="/dashboard/meals/{{ meal.id }}/" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
