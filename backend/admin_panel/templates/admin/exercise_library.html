{% extends 'admin/base.html' %}
{% block page_title %}Exercise Library{% endblock %}

{% block content %}
<style>
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }
    .stat-card {
        background: white;
        padding: 20px;
        border-radius: 15px;
        border-left: 4px solid var(--primary);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .stat-value { font-size: 28px; font-weight: 700; margin-top: 8px; }
    .exercise-table {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .exercise-table table {
        width: 100%;
        border-collapse: collapse;
    }
    .exercise-table th {
        background: #f8f9fa;
        padding: 15px;
        text-align: left;
        font-weight: 600;
        border-bottom: 2px solid #e0e0e0;
    }
    .exercise-table td {
        padding: 12px 15px;
        border-bottom: 1px solid #e0e0e0;
        vertical-align: middle;
    }
    .exercise-table tr:hover {
        background: #f8f9fa;
    }
    .video-preview {
        width: 60px;
        height: 60px;
        background: #f0f0f0;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    .video-preview video, .video-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        display: inline-block;
    }
    .badge-video { background: #d4edda; color: #155724; }
    .badge-no-video { background: #f8d7da; color: #721c24; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-inactive { background: #e2e3e5; color: #383d41; }
    .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .search-bar input, .filter-select {
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
    }
    .search-bar input { flex: 1; }
    .filter-select { padding: 10px 12px; }
    .btn {
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        border: none;
        font-size: 13px;
        font-weight: 500;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-warning { background: #ffc107; color: #333; }
    .btn-success { background: #28a745; color: white; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .action-buttons { display: flex; gap: 8px; }
    .empty-state {
        text-align: center;
        padding: 60px;
        background: white;
        border-radius: 15px;
    }
    .pagination {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
    }
    .pagination button {
        padding: 8px 15px;
        border: 1px solid #ddd;
        background: white;
        border-radius: 6px;
        cursor: pointer;
    }
    .pagination button.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }
</style>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-title">Total Exercises</div>
        <div class="stat-value" id="total-exercises">-</div>
    </div>
    <div class="stat-card">
        <div class="stat-title">With Videos</div>
        <div class="stat-value" id="exercises-with-video">-</div>
    </div>
    <div class="stat-card">
        <div class="stat-title">Active Exercises</div>
        <div class="stat-value" id="active-exercises">-</div>
    </div>
</div>

<div class="search-bar">
    <input type="text" id="search-input" placeholder="Search exercises by name..." class="form-control">
    <select id="goal-filter" class="filter-select">
        <option value="">All Goals</option>
        <option value="weight_loss">Weight Loss</option>
        <option value="muscle_gain">Muscle Gain</option>
        <option value="endurance">Endurance</option>
        <option value="strength">Strength</option>
    </select>
    <select id="location-filter" class="filter-select">
        <option value="">All Locations</option>
        <option value="home">Home</option>
        <option value="gym">Gym</option>
        <option value="outdoor">Outdoor</option>
    </select>
    <select id="video-filter" class="filter-select">
        <option value="">All Exercises</option>
        <option value="with_video">With Video Only</option>
        <option value="without_video">Without Video</option>
    </select>
    <button class="btn btn-primary" onclick="searchExercises()">Search</button>
    <button class="btn btn-success" onclick="location.href='/dashboard/exercise-library/create/'">+ Add Exercise</button>
</div>

<div id="exercises-container">
    <div style="text-align: center; padding: 40px;">Loading exercises...</div>
</div>

<script>
    let allExercises = [];
    let currentPage = 1;
    const itemsPerPage = 20;
    
    async function loadExercises() {
        try {
            const response = await fetch('/dashboard/api/exercises/list/');
            const data = await response.json();
            
            allExercises = data.exercises || [];
            const total = data.total || 0;
            const withVideo = allExercises.filter(e => e.has_video).length;
            const active = allExercises.filter(e => e.is_active).length;
            
            document.getElementById('total-exercises').innerText = total;
            document.getElementById('exercises-with-video').innerHTML = `${withVideo}<span style="font-size: 14px;"> / ${total}</span>`;
            document.getElementById('active-exercises').innerText = active;
            
            displayExercises();
        } catch (error) {
            console.error('Error loading exercises:', error);
            document.getElementById('exercises-container').innerHTML = '<div class="empty-state"><i class="fas fa-dumbbell"></i><h3>No Exercises Found</h3><p>Click "Add Exercise" to create your first exercise.</p></div>';
        }
    }
    
    function displayExercises() {
        let filtered = [...allExercises];
        const search = document.getElementById('search-input').value.toLowerCase();
        const goal = document.getElementById('goal-filter').value;
        const location = document.getElementById('location-filter').value;
        const videoFilter = document.getElementById('video-filter').value;
        
        if (search) {
            filtered = filtered.filter(e => e.name.toLowerCase().includes(search));
        }
        if (goal) {
            filtered = filtered.filter(e => e.primary_goal === goal);
        }
        if (location) {
            filtered = filtered.filter(e => e.training_location === location);
        }
        if (videoFilter === 'with_video') {
            filtered = filtered.filter(e => e.has_video);
        } else if (videoFilter === 'without_video') {
            filtered = filtered.filter(e => !e.has_video);
        }
        
        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        const paginated = filtered.slice(start, start + itemsPerPage);
        
        if (paginated.length === 0) {
            document.getElementById('exercises-container').innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><h3>No Exercises Found</h3><p>Try adjusting your filters.</p></div>';
            return;
        }
        
        let html = '<div class="exercise-table"><table>';
        html += '<thead><tr>';
        html += '<th>Preview</th><th>Exercise Name</th><th>Goal</th><th>Location</th><th>Level</th><th>Video</th><th>Status</th><th>Actions</th>';
        html += '</tr></thead><tbody>';
        
        for (let exercise of paginated) {
            const videoBadge = exercise.has_video ? 
                '<span class="badge badge-video"><i class="fas fa-video"></i> Has Video</span>' : 
                '<span class="badge badge-no-video"><i class="fas fa-video-slash"></i> No Video</span>';
            
            const statusBadge = exercise.is_active ?
                '<span class="badge badge-active">Active</span>' :
                '<span class="badge badge-inactive">Inactive</span>';
            
            let previewHtml = '<div class="video-preview">';
            if (exercise.video_url || exercise.thumbnail) {
                previewHtml += `<video src="${exercise.video_url || ''}" style="width:100%;height:100%;object-fit:cover;" muted></video>`;
            } else {
                previewHtml += '<i class="fas fa-dumbbell" style="font-size: 24px; color: #ccc;"></i>';
            }
            previewHtml += '</div>';
            
            html += '<tr>';
            html += `<td>${previewHtml}</td>`;
            html += `<td><strong>${escapeHtml(exercise.name)}</strong><br><small style="color:#666;">${escapeHtml(exercise.description?.substring(0, 50) || '')}</small></td>`;
            html += `<td>${exercise.primary_goal || '-'}</td>`;
            html += `<td>${exercise.training_location || '-'}</td>`;
            html += `<td>${exercise.experience_level || '-'}</td>`;
            html += `<td>${videoBadge}</td>`;
            html += `<td>${statusBadge}</td>`;
            html += `<td class="action-buttons">
                <button class="btn btn-warning btn-sm" onclick="editExercise('${exercise.id}')"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteExercise('${exercise.id}')"><i class="fas fa-trash"></i> Delete</button>
            </td>`;
            html += '</tr>';
        }
        
        html += '</tbody></table></div>';
        
        // Pagination
        if (totalPages > 1) {
            html += '<div class="pagination">';
            for (let i = 1; i <= Math.min(totalPages, 10); i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            if (totalPages > 10) {
                html += '<span>...</span>';
                html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            html += '</div>';
        }
        
        document.getElementById('exercises-container').innerHTML = html;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function searchExercises() {
        currentPage = 1;
        displayExercises();
    }
    
    function goToPage(page) {
        currentPage = page;
        displayExercises();
    }
    
    function editExercise(exerciseId) {
        window.location.href = `/dashboard/exercise-library/${exerciseId}/edit/`;
    }
    
    async function deleteExercise(exerciseId) {
        if (confirm('⚠️ Delete this exercise? This will remove it from all workout templates.')) {
            try {
                const response = await fetch(`/dashboard/api/exercises/${exerciseId}/delete/`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json'
                    }
                });
                if (response.ok) {
                    alert('✅ Exercise deleted successfully');
                    loadExercises();
                } else {
                    alert('❌ Error deleting exercise');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error deleting exercise');
            }
        }
    }
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Event listeners
    document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchExercises();
    });
    document.getElementById('goal-filter').addEventListener('change', searchExercises);
    document.getElementById('location-filter').addEventListener('change', searchExercises);
    document.getElementById('video-filter').addEventListener('change', searchExercises);
    
    loadExercises();
</script>
{% endblock %}
