{% extends 'admin/base.html' %}
{% block page_title %}Workout Library{% endblock %}

{% block content %}
<style>
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }
    .stat-card {
        background: white;
        padding: 20px;
        border-radius: 15px;
        border-left: 4px solid #4a90e2;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .stat-value { 
        font-size: 28px; 
        font-weight: 700; 
        margin-top: 8px;
    }
    .workout-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    .workout-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        border: 1px solid #e0e0e0;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .workout-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .workout-image {
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: #e3f2fd;
    }
    .workout-image-placeholder {
        width: 100%;
        height: 180px;
        background: #e3f2fd;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .workout-image-placeholder i {
        font-size: 60px;
        color: #4a90e2;
        opacity: 0.5;
    }
    .workout-content {
        padding: 20px;
    }
    .workout-name {
        font-size: 18px;
        font-weight: 700;
        color: #2c6bb0;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
    }
    .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
    }
    .badge-easy { background: #d4edda; color: #155724; }
    .badge-medium { background: #fff3cd; color: #856404; }
    .badge-hard { background: #f8d7da; color: #721c24; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-inactive { background: #e2e3e5; color: #383d41; }
    .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .search-bar input { 
        flex: 1; 
        padding: 10px 15px; 
        border: 1px solid #ddd; 
        border-radius: 8px;
        font-size: 14px;
    }
    .btn { 
        padding: 8px 16px; 
        border-radius: 8px; 
        cursor: pointer; 
        display: inline-flex; 
        align-items: center; 
        gap: 6px; 
        text-decoration: none; 
        border: none;
        font-size: 13px;
        font-weight: 500;
        transition: opacity 0.2s;
    }
    .btn-primary { background: #4a90e2; color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-warning { background: #ffc107; color: #333; }
    .btn-success { background: #28a745; color: white; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .action-buttons {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 15px;
    }
    .exercise-list { 
        margin-top: 12px; 
        padding-top: 12px; 
        border-top: 1px solid #e0e0e0;
    }
    .exercise-item { 
        padding: 5px 0; 
        font-size: 13px; 
        display: flex; 
        justify-content: space-between;
        border-bottom: 1px dashed #f0f0f0;
    }
    .empty-state {
        text-align: center;
        padding: 60px;
        background: white;
        border-radius: 15px;
    }
    .empty-state i {
        font-size: 60px;
        color: #6c757d;
        margin-bottom: 20px;
    }
    .workout-meta {
        display: flex;
        gap: 15px;
        font-size: 13px;
        color: #6c757d;
        margin-bottom: 10px;
        flex-wrap: wrap;
    }
    .workout-description {
        font-size: 13px;
        color: #6c757d;
        margin-bottom: 10px;
        line-height: 1.4;
    }
</style>

<div class="stats-grid">
    <div class="stat-card primary">
        <div class="stat-title">Total Workouts</div>
        <div class="stat-value" id="total-workouts">-</div>
    </div>
    <div class="stat-card secondary">
        <div class="stat-title">Active Workouts</div>
        <div class="stat-value" id="active-workouts">-</div>
    </div>
</div>

<div class="search-bar">
    <input type="text" id="search-input" placeholder="Search workouts by name..." class="form-control">
    <button class="btn btn-primary" id="search-btn">Search</button>
    <a href="/dashboard/workout-library/create/" class="btn btn-success">Create Template</a>
</div>

<div id="workouts-container">
    <div style="text-align: center; padding: 40px;">Loading workouts...</div>
</div>

<script>
    var allWorkouts = [];
    var currentSearch = '';
    
    async function loadWorkouts() {
        try {
            var response = await fetch('/dashboard/api/workout-library/list/');
            var data = await response.json();
            
            allWorkouts = data.templates || [];
            document.getElementById('total-workouts').innerText = data.total || 0;
            var activeCount = 0;
            for (var i = 0; i < allWorkouts.length; i++) {
                if (allWorkouts[i].is_active) activeCount++;
            }
            document.getElementById('active-workouts').innerText = activeCount;
            
            displayWorkouts(allWorkouts);
        } catch (error) {
            console.log('Error loading workouts:', error);
            document.getElementById('workouts-container').innerHTML = '<div class="empty-state"><i class="fas fa-dumbbell"></i><h3>No Workout Templates</h3><p>Click "Create Template" to add your first workout.</p></div>';
        }
    }
    
    function displayWorkouts(workouts) {
        var container = document.getElementById('workouts-container');
        var filtered = workouts;
        
        if (currentSearch !== '') {
            var searchLower = currentSearch.toLowerCase();
            filtered = [];
            for (var i = 0; i < workouts.length; i++) {
                if (workouts[i].name.toLowerCase().indexOf(searchLower) !== -1) {
                    filtered.push(workouts[i]);
                }
            }
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-dumbbell"></i><h3>No Workout Templates Found</h3><p>Click "Create Template" to add your first workout.</p></div>';
            return;
        }
        
        var html = '<div class="workout-grid">';
        
        for (var i = 0; i < filtered.length; i++) {
            var workout = filtered[i];
            var difficultyClass = '';
            var difficultyText = '';
            
            if (workout.difficulty === 'easy') {
                difficultyClass = 'badge-easy';
                difficultyText = 'Easy';
            } else if (workout.difficulty === 'hard') {
                difficultyClass = 'badge-hard';
                difficultyText = 'Hard';
            } else {
                difficultyClass = 'badge-medium';
                difficultyText = 'Medium';
            }
            
            var exercises = workout.exercises || [];
            var exercisesHtml = '';
            for (var j = 0; j < exercises.length && j < 4; j++) {
                var ex = exercises[j];
                if (ex.reps) {
                    exercisesHtml += '<div class="exercise-item"><span>' + ex.name + '</span><span>' + (ex.sets || 1) + ' x ' + ex.reps + ' reps ' + (ex.rest ? '| rest ' + ex.rest + 's' : '') + '</span></div>';
                } else if (ex.duration) {
                    exercisesHtml += '<div class="exercise-item"><span>' + ex.name + '</span><span>' + (ex.sets || 1) + ' x ' + ex.duration + 's ' + (ex.rest ? '| rest ' + ex.rest + 's' : '') + '</span></div>';
                } else {
                    exercisesHtml += '<div class="exercise-item"><span>' + ex.name + '</span><span></span></div>';
                }
            }
            
            var moreCount = exercises.length - 4;
            var moreHtml = '';
            if (moreCount > 0) {
                moreHtml = '<div class="exercise-item" style="color: #6c757d; justify-content: center;">+ ' + moreCount + ' more exercises...</div>';
            }
            
            var imageHtml = '';
            if (workout.image_url) {
                imageHtml = '<img src="' + workout.image_url + '" alt="' + workout.name + '" class="workout-image">';
            } else {
                imageHtml = '<div class="workout-image-placeholder"><i class="fas fa-dumbbell"></i></div>';
            }
            
            // Fix: Wrap UUID in quotes for the onclick function
            var workoutId = workout.id;
            var isStringId = typeof workoutId === 'string' && workoutId.indexOf('-') !== -1;
            var idParam = isStringId ? '"' + workoutId + '"' : workoutId;
            
            html += '<div class="workout-card">';
            html += imageHtml;
            html += '<div class="workout-content">';
            html += '<div class="workout-name">';
            html += '<span><i class="fas fa-dumbbell"></i> ' + workout.name + '</span>';
            html += '<span class="badge ' + (workout.is_active ? 'badge-active' : 'badge-inactive') + '">' + (workout.is_active ? 'Active' : 'Inactive') + '</span>';
            html += '</div>';
            html += '<div class="workout-meta">';
            html += '<span><i class="fas fa-clock"></i> ' + workout.duration + ' min</span>';
            html += '<span><i class="fas fa-chart-line"></i> <span class="badge ' + difficultyClass + '">' + difficultyText + '</span></span>';
            html += '<span><i class="fas fa-tag"></i> ' + (workout.goal || 'Fitness') + '</span>';
            html += '</div>';
            if (workout.description) {
                html += '<div class="workout-description">' + workout.description + '</div>';
            }
            html += '<div class="exercise-list">';
            html += '<strong>Exercises (' + exercises.length + '):</strong>';
            html += exercisesHtml;
            html += moreHtml;
            html += '</div>';
            html += '<div class="action-buttons">';
            html += '<button class="btn btn-warning btn-sm" onclick="editWorkout(\'' + workoutId + '\')">Edit</button>';
            html += '<button class="btn btn-danger btn-sm" onclick="deleteWorkout(\'' + workoutId + '\')">Delete</button>';
            html += '</div>';
            html += '</div></div>';
        }
        
        html += '</div>';
        container.innerHTML = html;
    }
    
    function searchWorkouts() {
        currentSearch = document.getElementById('search-input').value;
        displayWorkouts(allWorkouts);
    }
    
    function editWorkout(workoutId) {
        window.location.href = '/dashboard/workout-library/' + workoutId + '/edit/';
    }
    
    async function deleteWorkout(workoutId) {
        if (confirm('Delete this workout template? This action cannot be undone.')) {
            try {
                var response = await fetch('/dashboard/api/workout-library/' + workoutId + '/delete/', {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json'
                    }
                });
                if (response.ok) {
                    alert('Workout deleted successfully');
                    loadWorkouts();
                } else {
                    var errorText = await response.text();
                    alert('Error deleting workout: ' + errorText);
                }
            } catch (error) {
                console.log('Error:', error);
                alert('Error deleting workout');
            }
        }
    }
    
    function getCookie(name) {
        var cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    document.getElementById('search-btn').addEventListener('click', searchWorkouts);
    document.getElementById('search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchWorkouts();
        }
    });
    
    loadWorkouts();
</script>
{% endblock %}
