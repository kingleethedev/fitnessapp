{% extends 'admin/base.html' %}
{% block page_title %}Workout Library{% endblock %}

{% block content %}
<style>
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }
    .stat-card {
        background: white;
        padding: 20px;
        border-radius: 15px;
        border-left: 4px solid var(--primary);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .stat-value { 
        font-size: 28px; 
        font-weight: 700; 
        margin-top: 8px;
    }
    .workout-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    .workout-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        border: 1px solid #e0e0e0;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .workout-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .workout-image {
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: var(--primary-light);
    }
    .workout-image-placeholder {
        width: 100%;
        height: 180px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .workout-image-placeholder i {
        font-size: 60px;
        color: white;
        opacity: 0.8;
    }
    .workout-content {
        padding: 20px;
    }
    .workout-name {
        font-size: 18px;
        font-weight: 700;
        color: var(--primary-dark);
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
    }
    .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
    }
    .badge-easy { background: #d4edda; color: #155724; }
    .badge-medium { background: #fff3cd; color: #856404; }
    .badge-hard { background: #f8d7da; color: #721c24; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-inactive { background: #e2e3e5; color: #383d41; }
    .badge-video { background: #cce5ff; color: #004085; }
    .badge-no-video { background: #f8d7da; color: #721c24; }
    .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .search-bar input { 
        flex: 1; 
        padding: 10px 15px; 
        border: 1px solid #ddd; 
        border-radius: 8px;
        font-size: 14px;
    }
    .btn { 
        padding: 8px 16px; 
        border-radius: 8px; 
        cursor: pointer; 
        display: inline-flex; 
        align-items: center; 
        gap: 6px; 
        text-decoration: none; 
        border: none;
        font-size: 13px;
        font-weight: 500;
        transition: opacity 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-warning { background: #ffc107; color: #333; }
    .btn-success { background: #28a745; color: white; }
    .btn-info { background: #17a2b8; color: white; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .action-buttons {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 15px;
    }
    .exercise-list { 
        margin-top: 12px; 
        padding-top: 12px; 
        border-top: 1px solid #e0e0e0;
        max-height: 200px;
        overflow-y: auto;
    }
    .exercise-item { 
        padding: 8px 0; 
        font-size: 13px; 
        display: flex; 
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px dashed #f0f0f0;
    }
    .exercise-item:hover {
        background: #f8f9fa;
    }
    .video-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
    }
    .video-yes {
        background: #28a745;
        box-shadow: 0 0 4px #28a745;
    }
    .video-no {
        background: #dc3545;
    }
    .empty-state {
        text-align: center;
        padding: 60px;
        background: white;
        border-radius: 15px;
    }
    .empty-state i {
        font-size: 60px;
        color: var(--gray);
        margin-bottom: 20px;
    }
    .workout-meta {
        display: flex;
        gap: 15px;
        font-size: 13px;
        color: var(--gray);
        margin-bottom: 10px;
        flex-wrap: wrap;
    }
    .workout-description {
        font-size: 13px;
        color: var(--gray);
        margin-bottom: 10px;
        line-height: 1.4;
    }
    .filter-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .filter-select {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
    }
    .video-stats {
        font-size: 12px;
        margin-top: 5px;
        color: #666;
    }
    .progress-bar {
        height: 4px;
        background: #e0e0e0;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 5px;
    }
    .progress-fill {
        height: 100%;
        background: #28a745;
        transition: width 0.3s;
    }
</style>

<div class="stats-grid">
    <div class="stat-card primary">
        <div class="stat-title">Total Workouts</div>
        <div class="stat-value" id="total-workouts">-</div>
    </div>
    <div class="stat-card secondary">
        <div class="stat-title">Active Workouts</div>
        <div class="stat-value" id="active-workouts">-</div>
    </div>
    <div class="stat-card">
        <div class="stat-title">With Videos</div>
        <div class="stat-value" id="workouts-with-video">-</div>
    </div>
</div>

<div class="filter-bar">
    <input type="text" id="search-input" placeholder="Search workouts by name..." class="form-control">
    <select id="goal-filter" class="filter-select">
        <option value="">All Goals</option>
        <option value="FITNESS">Fitness</option>
        <option value="STRENGTH">Strength</option>
        <option value="MUSCLE_GAIN">Muscle Gain</option>
        <option value="ENDURANCE">Endurance</option>
        <option value="WEIGHT_LOSS">Weight Loss</option>
    </select>
    <select id="video-filter" class="filter-select">
        <option value="">All Workouts</option>
        <option value="with_video">With Videos Only</option>
        <option value="without_video">Without Videos</option>
    </select>
    <button class="btn btn-primary" onclick="searchWorkouts()">Search</button>
    <button class="btn btn-info" onclick="location.href='/dashboard/exercise-library/'">Exercise Library</button>
    <button class="btn btn-success" onclick="location.href='/dashboard/workout-library/create/'">Create Template</button>
</div>

<div id="workouts-container">
    <div style="text-align: center; padding: 40px;">Loading workouts...</div>
</div>

<script>
    let allWorkouts = [];
    let currentSearch = '';
    let currentGoal = '';
    let currentVideoFilter = '';
    
    async function loadWorkouts() {
        try {
            const response = await fetch('/dashboard/api/workout-library/list/');
            const data = await response.json();
            
            allWorkouts = data.templates || [];
            const totalWorkouts = data.total || 0;
            const activeCount = allWorkouts.filter(w => w.is_active).length;
            const workoutsWithVideo = allWorkouts.filter(w => w.has_videos).length;
            
            document.getElementById('total-workouts').innerText = totalWorkouts;
            document.getElementById('active-workouts').innerText = activeCount;
            document.getElementById('workouts-with-video').innerHTML = `${workoutsWithVideo}<span style="font-size: 14px;"> / ${totalWorkouts}</span>`;
            
            displayWorkouts(allWorkouts);
        } catch (error) {
            console.error('Error loading workouts:', error);
            document.getElementById('workouts-container').innerHTML = '<div class="empty-state"><i class="fas fa-dumbbell"></i><h3>No Workout Templates</h3><p>Click "Create Template" to add your first workout.</p></div>';
        }
    }
    
    function displayWorkouts(workouts) {
        let container = document.getElementById('workouts-container');
        let filtered = workouts;
        
        // Apply search filter
        if (currentSearch) {
            let searchLower = currentSearch.toLowerCase();
            filtered = filtered.filter(w => w.name.toLowerCase().includes(searchLower));
        }
        
        // Apply goal filter
        if (currentGoal) {
            filtered = filtered.filter(w => w.goal === currentGoal);
        }
        
        // Apply video filter
        if (currentVideoFilter === 'with_video') {
            filtered = filtered.filter(w => w.has_videos);
        } else if (currentVideoFilter === 'without_video') {
            filtered = filtered.filter(w => !w.has_videos);
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-dumbbell"></i><h3>No Workout Templates Found</h3><p>Try adjusting your filters or create a new template.</p></div>';
            return;
        }
        
        let html = '<div class="workout-grid">';
        
        for (let i = 0; i < filtered.length; i++) {
            let workout = filtered[i];
            
            // Calculate difficulty based on experience_level
            let difficultyClass = 'badge-medium';
            let difficultyText = 'Intermediate';
            if (workout.experience_level === 'BEGINNER') {
                difficultyClass = 'badge-easy';
                difficultyText = 'Beginner';
            } else if (workout.experience_level === 'ADVANCED') {
                difficultyClass = 'badge-hard';
                difficultyText = 'Advanced';
            }
            
            // Build exercises HTML with video indicators
            let exercisesHtml = '';
            let exercises = workout.exercises || [];
            let exercisesWithVideo = workout.exercises_with_video || 0;
            let videoPercentage = exercises.length > 0 ? (exercisesWithVideo / exercises.length * 100) : 0;
            
            for (let j = 0; j < Math.min(exercises.length, 5); j++) {
                let ex = exercises[j];
                let hasVideo = ex.has_video || ex.video_url;
                let videoIcon = hasVideo ? '<span class="video-indicator video-yes" title="Has video"></span>' : '<span class="video-indicator video-no" title="No video"></span>';
                
                if (ex.reps) {
                    exercisesHtml += `<div class="exercise-item">
                        <span>${videoIcon} ${ex.name}</span>
                        <span>${ex.sets || 1} x ${ex.reps} reps</span>
                    </div>`;
                } else if (ex.duration) {
                    exercisesHtml += `<div class="exercise-item">
                        <span>${videoIcon} ${ex.name}</span>
                        <span>${ex.sets || 1} x ${ex.duration}s</span>
                    </div>`;
                } else {
                    exercisesHtml += `<div class="exercise-item">
                        <span>${videoIcon} ${ex.name}</span>
                        <span></span>
                    </div>`;
                }
            }
            
            let moreCount = exercises.length - 5;
            let moreHtml = '';
            if (moreCount > 0) {
                moreHtml = '<div class="exercise-item" style="color: var(--gray); justify-content: center;">+ ' + moreCount + ' more exercises...</div>';
            }
            
            let imageHtml = '';
            if (workout.image_url) {
                imageHtml = '<img src="' + workout.image_url + '" alt="' + workout.name + '" class="workout-image">';
            } else {
                imageHtml = '<div class="workout-image-placeholder"><i class="fas fa-dumbbell"></i></div>';
            }
            
            // Video progress bar
            let progressBarHtml = '';
            if (exercises.length > 0) {
                progressBarHtml = `
                    <div class="video-stats">
                        <span>Videos: ${exercisesWithVideo}/${exercises.length} exercises</span>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${videoPercentage}%"></div>
                        </div>
                    </div>
                `;
            }
            
            html += '<div class="workout-card">';
            html += imageHtml;
            html += '<div class="workout-content">';
            html += '<div class="workout-name">';
            html += '<span><i class="fas fa-dumbbell"></i> ' + escapeHtml(workout.name) + '</span>';
            html += '<span class="badge ' + (workout.is_active ? 'badge-active' : 'badge-inactive') + '">' + (workout.is_active ? 'Active' : 'Inactive') + '</span>';
            html += '</div>';
            html += '<div class="workout-meta">';
            html += '<span><i class="fas fa-clock"></i> ' + workout.duration + ' min</span>';
            html += '<span><i class="fas fa-chart-line"></i> <span class="badge ' + difficultyClass + '">' + difficultyText + '</span></span>';
            html += '<span><i class="fas fa-map-marker-alt"></i> ' + (workout.training_location || 'Any') + '</span>';
            html += '</div>';
            if (workout.description) {
                html += '<div class="workout-description">' + escapeHtml(workout.description.substring(0, 100)) + (workout.description.length > 100 ? '...' : '') + '</div>';
            }
            html += progressBarHtml;
            html += '<div class="exercise-list">';
            html += '<strong>Exercises (' + exercises.length + '):</strong>';
            html += exercisesHtml;
            html += moreHtml;
            html += '</div>';
            html += '<div class="action-buttons">';
            html += '<button class="btn btn-info btn-sm" onclick="viewWorkout(\'' + workout.id + '\')" title="View Details"><i class="fas fa-eye"></i> View</button>';
            html += '<button class="btn btn-warning btn-sm" onclick="editWorkout(\'' + workout.id + '\')"><i class="fas fa-edit"></i> Edit</button>';
            html += '<button class="btn btn-danger btn-sm" onclick="deleteWorkout(\'' + workout.id + '\')"><i class="fas fa-trash"></i> Delete</button>';
            html += '</div>';
            html += '</div></div>';
        }
        
        html += '</div>';
        container.innerHTML = html;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function searchWorkouts() { 
        currentSearch = document.getElementById('search-input').value; 
        currentGoal = document.getElementById('goal-filter').value;
        currentVideoFilter = document.getElementById('video-filter').value;
        displayWorkouts(allWorkouts); 
    }
    
    function viewWorkout(workoutId) {
        window.location.href = '/dashboard/workout-library/' + workoutId + '/view/';
    }
    
    function editWorkout(workoutId) {
        window.location.href = '/dashboard/workout-library/' + workoutId + '/edit/';
    }
    
    async function deleteWorkout(id) {
        if (confirm('⚠️ Delete this workout template? This action cannot be undone.')) {
            try {
                const response = await fetch('/dashboard/api/workout-library/' + id + '/delete/', { 
                    method: 'DELETE', 
                    headers: { 
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json'
                    } 
                });
                if (response.ok) {
                    alert('✅ Workout deleted successfully');
                    loadWorkouts();
                } else {
                    alert('❌ Error deleting workout');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error deleting workout');
            }
        }
    }
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Event listeners
    document.getElementById('search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchWorkouts();
    });
    document.getElementById('goal-filter').addEventListener('change', searchWorkouts);
    document.getElementById('video-filter').addEventListener('change', searchWorkouts);
    
    loadWorkouts();
</script>
{% endblock %}
