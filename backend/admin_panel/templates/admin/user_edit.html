{% extends 'admin/base.html' %}
{% block page_title %}Edit User: {{ user_data.username }}{% endblock %}

{% block content %}
<div style="background: var(--white); padding: 30px; border-radius: 15px;">
    <form method="POST">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" value="{{ user_data.username }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ user_data.email }}" required>
            </div>
            <div class="form-group">
                <label>Height (cm)</label>
                <input type="number" name="height" class="form-control" value="{{ user_data.height|default:'' }}" step="0.1">
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" name="weight" class="form-control" value="{{ user_data.weight|default:'' }}" step="0.1">
            </div>
            <div class="form-group">
                <label>Fitness Goal</label>
                <select name="goal" class="form-control">
                    <option value="">Select goal</option>
                    <option value="FAT_LOSS" {% if user_data.goal == 'FAT_LOSS' %}selected{% endif %}>Fat Loss</option>
                    <option value="MUSCLE_GAIN" {% if user_data.goal == 'MUSCLE_GAIN' %}selected{% endif %}>Muscle Gain</option>
                    <option value="FITNESS" {% if user_data.goal == 'FITNESS' %}selected{% endif %}>General Fitness</option>
                </select>
            </div>
            <div class="form-group">
                <label>Experience Level</label>
                <select name="experience_level" class="form-control">
                    <option value="">Select level</option>
                    <option value="BEGINNER" {% if user_data.experience_level == 'BEGINNER' %}selected{% endif %}>Beginner</option>
                    <option value="INTERMEDIATE" {% if user_data.experience_level == 'INTERMEDIATE' %}selected{% endif %}>Intermediate</option>
                    <option value="ADVANCED" {% if user_data.experience_level == 'ADVANCED' %}selected{% endif %}>Advanced</option>
                </select>
            </div>
            <div class="form-group">
                <label>Training Location</label>
                <select name="training_location" class="form-control">
                    <option value="">Select location</option>
                    <option value="HOME" {% if user_data.training_location == 'HOME' %}selected{% endif %}>Home</option>
                    <option value="GYM" {% if user_data.training_location == 'GYM' %}selected{% endif %}>Gym</option>
                    <option value="OUTSIDE" {% if user_data.training_location == 'OUTSIDE' %}selected{% endif %}>Outside</option>
                </select>
            </div>
            <div class="form-group">
                <label>Days per Week</label>
                <input type="number" name="days_per_week" class="form-control" value="{{ user_data.days_per_week|default:'3' }}" min="1" max="7">
            </div>
            <div class="form-group">
                <label>Time Available (minutes)</label>
                <input type="number" name="time_available" class="form-control" value="{{ user_data.time_available|default:'30' }}" min="5" max="120">
            </div>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if user_data.is_active %}checked{% endif %}>
                Active Account
            </label>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_staff" {% if user_data.is_staff %}checked{% endif %}>
                Staff Access (Admin)
            </label>
        </div>
        
        <div style="margin-top: 30px; display: flex; gap: 15px;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Changes
            </button>
            <a href="/admin-panel/users/{{ user_data.id }}/" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
